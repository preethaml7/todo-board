<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 140" fill="none" aria-hidden="true">
  <defs>
    <linearGradient id="esGold" x1="0" y1="0" x2="200" y2="140" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#007AFF"/>
      <stop offset="0.5" stop-color="#4DA3FF"/>
      <stop offset="1" stop-color="#006FE6"/>
    </linearGradient>
    <linearGradient id="esIndigo" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#5b53e8" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#5b53e8" stop-opacity="0.04"/>
    </linearGradient>
    <pattern id="esDots" width="6" height="6" patternUnits="userSpaceOnUse">
      <circle cx="1" cy="1" r="0.55" fill="currentColor" opacity="0.22"/>
    </pattern>
  </defs>

<!-- brand mark: faint kanban columns at top -->
<g>
<rect x="22" y="6" width="46" height="11" rx="3" fill="currentColor" opacity="0.10"/>
<rect x="77" y="6" width="46" height="11" rx="3" fill="currentColor" opacity="0.10"/>
<rect x="132" y="6" width="46" height="11" rx="3" fill="currentColor" opacity="0.10"/>
</g>

<!-- timeline panel -->
<rect x="10" y="22" width="180" height="106" rx="12" fill="url(#esIndigo)" stroke="#5b53e8" stroke-opacity="0.25"/>
<rect x="10" y="22" width="180" height="106" rx="12" fill="url(#esDots)"/>

<!-- weekday axis ticks (faint) -->
<line x1="22" y1="32" x2="22" y2="120" stroke="currentColor" stroke-opacity="0.08" stroke-width="1"/>
<line x1="77" y1="32" x2="77" y2="120" stroke="currentColor" stroke-opacity="0.08" stroke-width="1"/>
<line x1="132" y1="32" x2="132" y2="120" stroke="currentColor" stroke-opacity="0.08" stroke-width="1"/>
<line x1="178" y1="32" x2="178" y2="120" stroke="currentColor" stroke-opacity="0.08" stroke-width="1"/>

<!-- hour gridlines (faint) -->
<line x1="22" y1="46" x2="178" y2="46" stroke="currentColor" stroke-opacity="0.06" stroke-width="0.75"/>
<line x1="22" y1="66" x2="178" y2="66" stroke="currentColor" stroke-opacity="0.06" stroke-width="0.75"/>
<line x1="22" y1="86" x2="178" y2="86" stroke="currentColor" stroke-opacity="0.06" stroke-width="0.75"/>
<line x1="22" y1="106" x2="178" y2="106" stroke="currentColor" stroke-opacity="0.06" stroke-width="0.75"/>

<!-- soft indigo ghost time slots (empty) -->
<rect x="26" y="36" width="46" height="14" rx="3" fill="#5b53e8" fill-opacity="0.10"/>
<rect x="81" y="56" width="46" height="14" rx="3" fill="#5b53e8" fill-opacity="0.10"/>
<rect x="136" y="76" width="46" height="14" rx="3" fill="#5b53e8" fill-opacity="0.10"/>
<rect x="26" y="96" width="46" height="14" rx="3" fill="#5b53e8" fill-opacity="0.10"/>
<rect x="136" y="36" width="46" height="14" rx="3" fill="#5b53e8" fill-opacity="0.10"/>
<rect x="81" y="96" width="46" height="14" rx="3" fill="#5b53e8" fill-opacity="0.10"/>

<!-- one gold placeholder card (the next thing you will schedule) -->
<g transform="translate(0 -1)">
<rect x="29" y="56" width="40" height="20" rx="4" fill="url(#esGold)" opacity="0.95"/>
<rect x="33" y="61" width="24" height="1.6" rx="0.8" fill="#fff" opacity="0.9"/>
<rect x="33" y="65.5" width="32" height="1.2" rx="0.6" fill="#fff" opacity="0.55"/>
<rect x="33" y="69" width="20" height="1.2" rx="0.6" fill="#fff" opacity="0.40"/>
</g>

<!-- clock icon hint bottom-right -->
<circle cx="170" cy="116" r="10" fill="url(#esGold)"/>
<circle cx="170" cy="116" r="6.5" fill="none" stroke="#fff" stroke-width="1.2" opacity="0.9"/>
<line x1="170" y1="116" x2="170" y2="111.5" stroke="#fff" stroke-width="1.4" stroke-linecap="round"/>
<line x1="170" y1="116" x2="173.5" y2="116" stroke="#fff" stroke-width="1.4" stroke-linecap="round"/>
</svg>
