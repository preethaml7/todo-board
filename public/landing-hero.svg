<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 360" fill="none" aria-hidden="true">
  <defs>
    <!-- Brand gold gradient -->
    <linearGradient id="lhGold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#007AFF"/>
      <stop offset="0.5" stop-color="#4DA3FF"/>
      <stop offset="1" stop-color="#006FE6"/>
    </linearGradient>

    <!-- Saturated gold for accent cards -->
    <linearGradient id="lhGoldFlat" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#4DA3FF"/>
      <stop offset="1" stop-color="#007AFF"/>
    </linearGradient>

    <!-- Background wash (indigo → soft) -->
    <linearGradient id="lhBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#5b53e8" stop-opacity="0.22"/>
      <stop offset="0.55" stop-color="#5b53e8" stop-opacity="0.10"/>
      <stop offset="1" stop-color="#5b53e8" stop-opacity="0.02"/>
    </linearGradient>

    <!-- Soft halo behind the central column -->
    <radialGradient id="lhHalo" cx="0.5" cy="0.55" r="0.55">
      <stop offset="0" stop-color="#4DA3FF" stop-opacity="0.28"/>
      <stop offset="0.6" stop-color="#4DA3FF" stop-opacity="0.05"/>
      <stop offset="1" stop-color="#4DA3FF" stop-opacity="0"/>
    </radialGradient>

    <!-- Subtle dot grid -->
    <pattern id="lhDots" x="0" y="0" width="16" height="16" patternUnits="userSpaceOnUse">
      <circle cx="1" cy="1" r="1" fill="#5b53e8" fill-opacity="0.18"/>
    </pattern>

    <!-- Card drop shadow -->
    <filter id="lhShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3"/>
      <feOffset dx="0" dy="3" result="off"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.18"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <filter id="lhShadowSoft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="6"/>
      <feOffset dx="0" dy="6" result="off"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.12"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- ===== Background plate ===== -->
  <rect x="0" y="0" width="480" height="360" fill="url(#lhBg)"/>
  <rect x="0" y="0" width="480" height="360" fill="url(#lhDots)"/>
  <ellipse cx="240" cy="200" rx="220" ry="150" fill="url(#lhHalo)"/>

  <!-- ===== Floating decorative shapes (depth) ===== -->
  <g opacity="0.9">
    <!-- top-left plus -->
    <g transform="translate(40 56) rotate(-12)">
      <rect x="-9" y="-9" width="18" height="18" rx="4" fill="url(#lhGoldFlat)" opacity="0.85"/>
    </g>
    <!-- top-right ring -->
    <g transform="translate(430 50)">
      <circle cx="0" cy="0" r="14" fill="none" stroke="url(#lhGold)" stroke-width="2.5" opacity="0.7"/>
      <circle cx="0" cy="0" r="4" fill="url(#lhGold)" opacity="0.9"/>
    </g>
    <!-- mid-right small dot trio -->
    <g transform="translate(448 180)" opacity="0.55">
      <circle cx="0" cy="0" r="2.2" fill="#5b53e8"/>
      <circle cx="0" cy="9" r="2.2" fill="#5b53e8"/>
      <circle cx="0" cy="18" r="2.2" fill="#5b53e8"/>
    </g>
    <!-- bottom-left wave arc -->
    <path d="M 16 318 Q 40 300 64 318" fill="none" stroke="url(#lhGold)" stroke-width="2.5" stroke-linecap="round" opacity="0.7"/>
    <!-- sparkle near top -->
    <g transform="translate(186 38)" opacity="0.85">
      <path d="M 0 -7 L 1.6 -1.6 L 7 0 L 1.6 1.6 L 0 7 L -1.6 1.6 L -7 0 L -1.6 -1.6 Z" fill="url(#lhGold)"/>
    </g>
    <!-- sparkle near center-top -->
    <g transform="translate(312 70)" opacity="0.7">
      <path d="M 0 -5 L 1.1 -1.1 L 5 0 L 1.1 1.1 L 0 5 L -1.1 1.1 L -5 0 L -1.1 -1.1 Z" fill="url(#lhGold)"/>
    </g>
  </g>

  <!-- ===== Brand mark (top-left chip) ===== -->
  <g transform="translate(36 36)" filter="url(#lhShadowSoft)">
    <!-- Stacked-card logo -->
    <g>
      <rect x="2" y="6" width="22" height="22" rx="5" fill="url(#lhGoldFlat)" opacity="0.55"/>
      <rect x="6" y="2" width="22" height="22" rx="5" fill="url(#lhGold)"/>
      <rect x="11" y="9" width="11" height="1.6" rx="0.8" fill="#fff" opacity="0.95"/>
      <rect x="11" y="14" width="8" height="1.6" rx="0.8" fill="#fff" opacity="0.7"/>
    </g>
    <!-- Wordmark -->
    <text x="38" y="22" font-family="ui-sans-serif, system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif" font-size="14" font-weight="700" fill="currentColor" letter-spacing="-0.2">boardspace</text>
  </g>

  <!-- ===== Kanban workspace ===== -->
  <!--
       Three columns at slight perspective.
       Col widths 100, spacing 14. Slight vertical offsets.
  -->

  <!-- Column 1: To do -->
  <g transform="translate(60 92)">
    <!-- panel -->
    <rect x="0" y="0" width="100" height="232" rx="12" fill="currentColor" opacity="0.06"/>
    <rect x="0" y="0" width="100" height="232" rx="12" fill="none" stroke="#5b53e8" stroke-opacity="0.18" stroke-width="1"/>
    <!-- header -->
    <circle cx="14" cy="16" r="3.5" fill="url(#lhGoldFlat)"/>
    <rect x="24" y="13" width="40" height="6" rx="3" fill="currentColor" opacity="0.35"/>
    <rect x="74" y="11" width="18" height="10" rx="5" fill="currentColor" opacity="0.12"/>

    <!-- card 1 -->
    <g filter="url(#lhShadow)">
      <rect x="10" y="34" width="80" height="42" rx="7" fill="#fff" stroke="#5b53e8" stroke-opacity="0.12"/>
      <rect x="16" y="42" width="44" height="3" rx="1.5" fill="currentColor" opacity="0.55"/>
      <rect x="16" y="50" width="60" height="2" rx="1" fill="currentColor" opacity="0.22"/>
      <rect x="16" y="55" width="52" height="2" rx="1" fill="currentColor" opacity="0.22"/>
      <circle cx="16" cy="68" r="3" fill="#5b53e8" opacity="0.35"/>
      <rect x="22" y="66.5" width="20" height="3" rx="1.5" fill="currentColor" opacity="0.25"/>
    </g>

    <!-- card 2 -->
    <g filter="url(#lhShadow)" transform="translate(0 0)">
      <rect x="10" y="86" width="80" height="50" rx="7" fill="#fff" stroke="#5b53e8" stroke-opacity="0.12"/>
      <rect x="16" y="94" width="36" height="3" rx="1.5" fill="currentColor" opacity="0.55"/>
      <rect x="16" y="102" width="60" height="2" rx="1" fill="currentColor" opacity="0.22"/>
      <rect x="16" y="107" width="48" height="2" rx="1" fill="currentColor" opacity="0.22"/>
      <rect x="16" y="112" width="40" height="2" rx="1" fill="currentColor" opacity="0.22"/>
      <!-- tag pills -->
      <rect x="16" y="121" width="26" height="8" rx="4" fill="url(#lhGoldFlat)" opacity="0.85"/>
      <rect x="46" y="121" width="20" height="8" rx="4" fill="#5b53e8" opacity="0.25"/>
    </g>

    <!-- card 3 (faint, partial) -->
    <rect x="10" y="146" width="80" height="40" rx="7" fill="#fff" stroke="#5b53e8" stroke-opacity="0.12"/>
    <rect x="16" y="154" width="32" height="3" rx="1.5" fill="currentColor" opacity="0.4"/>
    <rect x="16" y="162" width="50" height="2" rx="1" fill="currentColor" opacity="0.18"/>
    <rect x="16" y="167" width="42" height="2" rx="1" fill="currentColor" opacity="0.18"/>
  </g>

  <!-- Column 2: In progress (hero column) -->
  <g transform="translate(188 76)">
    <!-- panel -->
    <rect x="0" y="0" width="104" height="248" rx="13" fill="currentColor" opacity="0.07"/>
    <rect x="0" y="0" width="104" height="248" rx="13" fill="none" stroke="#5b53e8" stroke-opacity="0.22" stroke-width="1"/>
    <!-- header -->
    <circle cx="14" cy="16" r="4" fill="url(#lhGold)"/>
    <rect x="24" y="13" width="48" height="6" rx="3" fill="currentColor" opacity="0.45"/>
    <!-- progress chip -->
    <rect x="72" y="11" width="22" height="10" rx="5" fill="url(#lhGoldFlat)" opacity="0.95"/>
    <text x="83" y="18.5" font-family="ui-sans-serif, system-ui, -apple-system, sans-serif" font-size="7" font-weight="700" fill="#fff" text-anchor="middle">2/5</text>

    <!-- the GOLD card (hero focus) -->
    <g filter="url(#lhShadowSoft)">
      <rect x="10" y="34" width="84" height="58" rx="8" fill="url(#lhGold)"/>
      <!-- check icon top-right -->
      <circle cx="82" cy="44" r="6" fill="#fff" opacity="0.25"/>
      <path d="M 79 44 L 81.5 46.5 L 85.5 41.5" fill="none" stroke="#fff" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
      <!-- title bar -->
      <rect x="16" y="44" width="44" height="4" rx="2" fill="#fff" opacity="0.95"/>
      <!-- body bars -->
      <rect x="16" y="54" width="64" height="2.5" rx="1.25" fill="#fff" opacity="0.55"/>
      <rect x="16" y="60" width="56" height="2.5" rx="1.25" fill="#fff" opacity="0.45"/>
      <rect x="16" y="66" width="46" height="2.5" rx="1.25" fill="#fff" opacity="0.4"/>
      <!-- footer: avatar + label -->
      <circle cx="20" cy="82" r="5" fill="#fff" opacity="0.95"/>
      <circle cx="20" cy="82" r="5" fill="url(#lhGold)" opacity="0.4"/>
      <rect x="30" y="79.5" width="22" height="3" rx="1.5" fill="#fff" opacity="0.85"/>
      <rect x="30" y="84.5" width="14" height="2" rx="1" fill="#fff" opacity="0.55"/>
    </g>

    <!-- card 2 (white, below) -->
    <g filter="url(#lhShadow)">
      <rect x="10" y="104" width="84" height="46" rx="8" fill="#fff" stroke="#5b53e8" stroke-opacity="0.12"/>
      <rect x="16" y="113" width="40" height="3" rx="1.5" fill="currentColor" opacity="0.55"/>
      <rect x="16" y="121" width="60" height="2" rx="1" fill="currentColor" opacity="0.22"/>
      <rect x="16" y="126" width="48" height="2" rx="1" fill="currentColor" opacity="0.22"/>
      <circle cx="20" cy="140" r="4" fill="url(#lhGoldFlat)"/>
      <rect x="28" y="138" width="24" height="3" rx="1.5" fill="currentColor" opacity="0.3"/>
    </g>

    <!-- card 3 (white, partial) -->
    <rect x="10" y="160" width="84" height="44" rx="8" fill="#fff" stroke="#5b53e8" stroke-opacity="0.12"/>
    <rect x="16" y="169" width="34" height="3" rx="1.5" fill="currentColor" opacity="0.45"/>
    <rect x="16" y="177" width="52" height="2" rx="1" fill="currentColor" opacity="0.18"/>
    <rect x="16" y="182" width="40" height="2" rx="1" fill="currentColor" opacity="0.18"/>
  </g>

  <!-- Column 3: Done -->
  <g transform="translate(320 100)">
    <rect x="0" y="0" width="100" height="224" rx="12" fill="currentColor" opacity="0.05"/>
    <rect x="0" y="0" width="100" height="224" rx="12" fill="none" stroke="#5b53e8" stroke-opacity="0.18" stroke-width="1"/>
    <!-- header -->
    <circle cx="14" cy="16" r="3.5" fill="#5b53e8" opacity="0.45"/>
    <rect x="24" y="13" width="32" height="6" rx="3" fill="currentColor" opacity="0.35"/>
    <rect x="74" y="11" width="18" height="10" rx="5" fill="currentColor" opacity="0.12"/>

    <!-- done card 1 (with check) -->
    <g filter="url(#lhShadow)">
      <rect x="10" y="34" width="80" height="38" rx="7" fill="#fff" stroke="#5b53e8" stroke-opacity="0.12"/>
      <circle cx="18" cy="44" r="5" fill="url(#lhGoldFlat)" opacity="0.95"/>
      <path d="M 15.5 44 L 17.5 46 L 21 42" fill="none" stroke="#fff" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
      <rect x="28" y="40" width="46" height="3" rx="1.5" fill="currentColor" opacity="0.35"/>
      <rect x="28" y="48" width="50" height="2" rx="1" fill="currentColor" opacity="0.18"/>
      <rect x="28" y="53" width="36" height="2" rx="1" fill="currentColor" opacity="0.18"/>
    </g>

    <!-- done card 2 -->
    <g filter="url(#lhShadow)">
      <rect x="10" y="82" width="80" height="38" rx="7" fill="#fff" stroke="#5b53e8" stroke-opacity="0.12"/>
      <circle cx="18" cy="92" r="5" fill="url(#lhGoldFlat)" opacity="0.95"/>
      <path d="M 15.5 92 L 17.5 94 L 21 90" fill="none" stroke="#fff" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
      <rect x="28" y="88" width="38" height="3" rx="1.5" fill="currentColor" opacity="0.35"/>
      <rect x="28" y="96" width="50" height="2" rx="1" fill="currentColor" opacity="0.18"/>
      <rect x="28" y="101" width="40" height="2" rx="1" fill="currentColor" opacity="0.18"/>
    </g>

    <!-- done card 3 -->
    <g filter="url(#lhShadow)">
      <rect x="10" y="130" width="80" height="38" rx="7" fill="#fff" stroke="#5b53e8" stroke-opacity="0.12"/>
      <circle cx="18" cy="140" r="5" fill="url(#lhGoldFlat)" opacity="0.95"/>
      <path d="M 15.5 140 L 17.5 142 L 21 138" fill="none" stroke="#fff" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
      <rect x="28" y="136" width="42" height="3" rx="1.5" fill="currentColor" opacity="0.35"/>
      <rect x="28" y="144" width="48" height="2" rx="1" fill="currentColor" opacity="0.18"/>
      <rect x="28" y="149" width="34" height="2" rx="1" fill="currentColor" opacity="0.18"/>
    </g>

    <!-- ghost card -->
    <rect x="10" y="178" width="80" height="30" rx="7" fill="#fff" stroke="#5b53e8" stroke-opacity="0.08"/>
    <rect x="16" y="186" width="30" height="3" rx="1.5" fill="currentColor" opacity="0.25"/>
    <rect x="16" y="194" width="44" height="2" rx="1" fill="currentColor" opacity="0.14"/>
  </g>

  <!-- ===== Floating "in-flight" cards (the magic) ===== -->
  <!-- a card drifting up-right from col 2 -->
  <g transform="translate(298 38) rotate(8)" filter="url(#lhShadowSoft)">
    <rect x="0" y="0" width="62" height="38" rx="7" fill="#fff" stroke="#5b53e8" stroke-opacity="0.14"/>
    <rect x="6" y="8" width="32" height="3" rx="1.5" fill="currentColor" opacity="0.55"/>
    <rect x="6" y="16" width="46" height="2" rx="1" fill="currentColor" opacity="0.22"/>
    <rect x="6" y="21" width="38" height="2" rx="1" fill="currentColor" opacity="0.22"/>
    <rect x="6" y="28" width="20" height="5" rx="2.5" fill="url(#lhGoldFlat)" opacity="0.95"/>
  </g>

  <!-- a tiny card drifting between col 1 and col 2 -->
  <g transform="translate(168 152) rotate(-10)" filter="url(#lhShadow)">
    <rect x="0" y="0" width="38" height="26" rx="5" fill="#fff" stroke="#5b53e8" stroke-opacity="0.14"/>
    <rect x="5" y="6" width="20" height="2.5" rx="1.25" fill="currentColor" opacity="0.5"/>
    <rect x="5" y="12" width="28" height="1.6" rx="0.8" fill="currentColor" opacity="0.22"/>
    <rect x="5" y="16" width="22" height="1.6" rx="0.8" fill="currentColor" opacity="0.22"/>
    <circle cx="30" cy="20" r="3" fill="url(#lhGold)"/>
  </g>

  <!-- ===== Trailing sparkles on the in-flight path ===== -->
  <g opacity="0.85">
    <circle cx="284" cy="60" r="2" fill="url(#lhGold)"/>
    <circle cx="272" cy="82" r="1.4" fill="url(#lhGold)" opacity="0.7"/>
    <circle cx="294" cy="86" r="1.6" fill="url(#lhGold)" opacity="0.6"/>
    <circle cx="184" cy="134" r="1.5" fill="url(#lhGold)" opacity="0.7"/>
  </g>

  <!-- ===== Bottom corner: "next action" gold chip with plus ===== -->
  <g transform="translate(396 296)" filter="url(#lhShadowSoft)">
    <circle cx="0" cy="0" r="18" fill="url(#lhGold)"/>
    <line x1="0" y1="-8" x2="0" y2="8" stroke="#fff" stroke-width="2.4" stroke-linecap="round"/>
    <line x1="-8" y1="0" x2="8" y2="0" stroke="#fff" stroke-width="2.4" stroke-linecap="round"/>
  </g>

  <!-- ===== Subtle ground line (perspective) ===== -->
  <line x1="40" y1="336" x2="440" y2="336" stroke="#5b53e8" stroke-opacity="0.18" stroke-width="1" stroke-dasharray="2 4"/>
</svg>